<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — SecureBank AI</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>

<body class="page-auth">

  <div class="auth-container">

    <!-- Left panel -->
    <div class="auth-panel auth-panel-left">
      <a href="/" class="nav-brand">
        <span class="shield-icon">🛡</span>
        <span class="brand-name">SecureBank<span class="brand-ai">AI</span></span>
      </a>

      <div class="auth-illustration">
        <div class="float-card">
          <div class="fc-label">Fraud Detected</div>
          <div class="fc-risk high">HIGH RISK</div>
          <div class="fc-amount">₹ 14,500</div>
        </div>

        <div class="float-card safe">
          <div class="fc-label">Verified Safe</div>
          <div class="fc-risk low">LOW RISK</div>
          <div class="fc-amount">₹ 350</div>
        </div>
      </div>

      <p class="auth-panel-tagline">AI protects every rupee, every second.</p>
    </div>

    <!-- Right panel -->
    <div class="auth-panel auth-panel-right">
      <div class="auth-form-wrapper">

        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-sub">Sign in to your secure account</p>

        <div id="auth-alert" class="alert hidden"></div>

        <!-- LOGIN FORM -->
        <form id="login-form" novalidate>

          <div class="form-group">
            <label>Email address</label>
            <input type="email" id="email" placeholder="you@example.com"/>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-pw-wrap">
              <input type="password" id="password" placeholder="Your password"/>
              <button type="button" class="toggle-pw" onclick="togglePw('password')">👁</button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full">
            Sign In
          </button>

        </form>

        <!-- ✅ OTP SECTION (NEW) -->
        <div id="otp-section" style="display:none; margin-top:20px;">
          <div class="form-group">
            <label>Enter OTP</label>
            <input type="text" id="otp" placeholder="Enter 6-digit OTP"/>
          </div>

          <button onclick="verifyOTP()" class="btn btn-success btn-full">
            Verify OTP
          </button>
        </div>

        <p class="auth-switch">
          Don't have an account?
          <a href="/register">Create one →</a>
        </p>

      </div>
    </div>

  </div>

  <!-- JS -->
  <script>
    // LOGIN SUBMIT
    document.getElementById("login-form").addEventListener("submit", function(e){
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      fetch("/api/login", {
  method: "POST",
  headers: {"Content-Type": "application/json"},
  credentials: "include",   // 🔥 IMPORTANT
  body: JSON.stringify({email, password})
})
      .then(res => res.json())
      .then(data => {
        alert(data.message || data.error);

        if(data.message){
          // ✅ Show OTP section
          document.getElementById("otp-section").style.display = "block";
        }
      });
    });

    function verifyOTP(){
  const otp = document.getElementById("otp").value;

  fetch("/api/verify-otp", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    credentials: "include",   // 🔥 IMPORTANT
    body: JSON.stringify({otp})
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message || data.error);

    if(data.message){
      window.location.href = "/dashboard";  // redirect
    }
  });
}
  </script>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
